name: Validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  hassfest:
    name: hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

  test:
    name: pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install -r requirements-test.txt
      - run: pytest

# HACS store validation (hacs/action) needs a PUBLIC repo with topics, a
# release, and the logo merged into home-assistant/brands. On a private repo it
# false-fails (can't read manifest.json / hacs.json over the API). Re-enable it
# when going public:
#
#   hacs:
#     name: HACS
#     runs-on: ubuntu-latest
#     steps:
#       - uses: actions/checkout@v4
#       - uses: hacs/action@main
#         with:
#           category: integration
#           ignore: brands
