[pytest]
# Single-repo layout: the integration lives at custom_components/showmo and
# vendors pyshowmo under it. `pythonpath` makes both importable without editing
# any test imports:
#   .                       -> `import custom_components.showmo.*`
#   custom_components/showmo -> `import pyshowmo.*` resolves to the vendored copy
# `asyncio_mode = auto` lets the Home Assistant integration tests run as-is.

asyncio_mode = auto

pythonpath =
    .
    custom_components/showmo

testpaths =
    tests
